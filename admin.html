<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRC World Market — 관리자</title>
<style>
:root {
  --color-primary-500: #1A4B7C;
  --color-primary-400: #2563a8;
  --color-primary-100: #dbeafe;
  --color-neutral-50:  #f9fafb;
  --color-neutral-100: #f3f4f6;
  --color-neutral-200: #e5e7eb;
  --color-neutral-300: #d1d5db;
  --color-neutral-500: #6b7280;
  --color-neutral-700: #374151;
  --color-neutral-900: #111827;
  --color-green-100:  #dcfce7;
  --color-green-600:  #16a34a;
  --color-red-100:    #fee2e2;
  --color-red-600:    #dc2626;
  --color-yellow-100: #fef9c3;
  --color-yellow-700: #a16207;
  --color-orange-100: #ffedd5;
  --color-orange-600: #ea580c;
  --color-blue-100:   #dbeafe;
  --color-blue-600:   #2563eb;
  --radius: 6px;
  --shadow: 0 1px 3px rgba(0,0,0,.1);
  --shadow-md: 0 4px 12px rgba(0,0,0,.15);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--color-neutral-100); color: var(--color-neutral-900); font-size: 14px; }

/* ── HEADER ── */
.admin-header {
  background: var(--color-primary-500);
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.admin-header .brand { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.admin-header .brand span { opacity: .7; font-size: 12px; font-weight: 400; margin-left: 8px; }
.header-spacer { flex: 1; }
.header-btn {
  background: rgba(255,255,255,.15);
  color: #fff;
  border: 1px solid rgba(255,255,255,.3);
  border-radius: var(--radius);
  padding: 6px 14px;
  font-size: 13px;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: background .15s;
}
.header-btn:hover { background: rgba(255,255,255,.25); }
.header-btn.danger { background: rgba(220,38,38,.3); border-color: rgba(220,38,38,.5); }

/* ── AUTH GATE ── */
#auth-gate {
  min-height: calc(100vh - 56px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.auth-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow-md);
  padding: 40px 48px;
  width: 420px;
  text-align: center;
}
.auth-card h2 { font-size: 20px; margin-bottom: 8px; }
.auth-card p { color: var(--color-neutral-500); margin-bottom: 24px; font-size: 13px; }
.auth-input-wrap { display: flex; gap: 8px; }
.auth-input-wrap input {
  flex: 1;
  padding: 10px 14px;
  border: 1.5px solid var(--color-neutral-300);
  border-radius: var(--radius);
  font-size: 14px;
}
.auth-input-wrap input:focus { outline: none; border-color: var(--color-primary-400); }
.auth-input-wrap button {
  padding: 10px 20px;
  background: var(--color-primary-500);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 14px;
  cursor: pointer;
  font-weight: 600;
}
#auth-error { color: var(--color-red-600); font-size: 13px; margin-top: 10px; display: none; }

/* ── MAIN ── */
#main { display: none; }

/* ── STATS STRIP ── */
.stats-strip {
  background: #fff;
  border-bottom: 1px solid var(--color-neutral-200);
  padding: 12px 24px;
  display: flex;
  gap: 24px;
  align-items: center;
}
.stat-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
}
.stat-chip .dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.stat-chip .dot.review  { background: var(--color-orange-600); }
.stat-chip .dot.approved{ background: var(--color-green-600); }
.stat-chip .dot.rejected{ background: var(--color-red-600); }
.stat-chip .dot.hold    { background: var(--color-yellow-700); }
.stat-num { font-weight: 700; font-size: 16px; }
.stats-strip .divider { width: 1px; height: 28px; background: var(--color-neutral-200); }
.stats-collect-info { font-size: 12px; color: var(--color-neutral-500); margin-left: auto; }

/* ── TOOLBAR ── */
.toolbar {
  padding: 12px 24px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.toolbar select, .toolbar input[type=text] {
  padding: 7px 10px;
  border: 1.5px solid var(--color-neutral-300);
  border-radius: var(--radius);
  font-size: 13px;
  background: #fff;
}
.toolbar select:focus, .toolbar input:focus { outline: none; border-color: var(--color-primary-400); }
.toolbar input[type=text] { width: 220px; }
.btn {
  padding: 7px 14px;
  border-radius: var(--radius);
  font-size: 13px;
  cursor: pointer;
  border: none;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: opacity .15s;
}
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-primary  { background: var(--color-primary-500); color: #fff; }
.btn-success  { background: var(--color-green-600); color: #fff; }
.btn-danger   { background: var(--color-red-600); color: #fff; }
.btn-warning  { background: var(--color-yellow-700); color: #fff; }
.btn-secondary{ background: var(--color-neutral-200); color: var(--color-neutral-700); }
.toolbar .spacer { flex: 1; }

/* ── TABLE WRAPPER ── */
.table-wrap {
  padding: 0 24px 24px;
}
.table-container {
  background: #fff;
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
}
thead th {
  background: var(--color-neutral-50);
  padding: 10px 12px;
  text-align: left;
  font-size: 12px;
  font-weight: 600;
  color: var(--color-neutral-500);
  text-transform: uppercase;
  letter-spacing: .5px;
  border-bottom: 1px solid var(--color-neutral-200);
  white-space: nowrap;
}
thead th:first-child { padding-left: 16px; }
tbody tr {
  border-bottom: 1px solid var(--color-neutral-100);
  transition: background .1s;
  cursor: pointer;
}
tbody tr:hover { background: var(--color-neutral-50); }
tbody tr.selected { background: var(--color-blue-100); }
tbody td {
  padding: 10px 12px;
  vertical-align: middle;
}
tbody td:first-child { padding-left: 16px; }
.cell-title { max-width: 340px; }
.cell-title .t-main {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 320px;
}
.cell-title .t-sub {
  font-size: 11px;
  color: var(--color-neutral-500);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 320px;
}
.source-badge {
  display: inline-block;
  padding: 2px 7px;
  border-radius: 99px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
  background: var(--color-primary-100);
  color: var(--color-primary-500);
}
.status-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
}
.status-badge.review   { background: var(--color-orange-100); color: var(--color-orange-600); }
.status-badge.approved { background: var(--color-green-100); color: var(--color-green-600); }
.status-badge.rejected { background: var(--color-red-100); color: var(--color-red-600); }
.status-badge.hold     { background: var(--color-yellow-100); color: var(--color-yellow-700); }
.score-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 80px;
}
.score-bar .bar {
  flex: 1;
  height: 4px;
  background: var(--color-neutral-200);
  border-radius: 2px;
  overflow: hidden;
}
.score-bar .bar-fill { height: 100%; border-radius: 2px; background: var(--color-primary-500); }
.score-bar .num { font-size: 11px; color: var(--color-neutral-500); width: 22px; text-align: right; }
.deadline-cell { white-space: nowrap; font-size: 12px; }
.deadline-cell .dday {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  margin-left: 4px;
}
.dday.urgent { background: var(--color-red-100); color: var(--color-red-600); }
.dday.soon   { background: var(--color-orange-100); color: var(--color-orange-600); }
.dday.ok     { background: var(--color-neutral-100); color: var(--color-neutral-500); }
.dday.expired{ background: var(--color-neutral-200); color: var(--color-neutral-500); }
.actions-cell {
  display: flex;
  gap: 4px;
  white-space: nowrap;
}
.act-btn {
  padding: 4px 9px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: opacity .1s;
}
.act-btn:hover { opacity: .8; }
.act-approve { background: var(--color-green-100); color: var(--color-green-600); }
.act-reject  { background: var(--color-red-100); color: var(--color-red-600); }
.act-hold    { background: var(--color-yellow-100); color: var(--color-yellow-700); }
.act-edit    { background: var(--color-blue-100); color: var(--color-blue-600); }

/* ── PAGINATION ── */
.pagination {
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
}
.page-btn {
  padding: 5px 11px;
  border: 1.5px solid var(--color-neutral-300);
  border-radius: var(--radius);
  background: #fff;
  font-size: 13px;
  cursor: pointer;
}
.page-btn:hover { background: var(--color-neutral-100); }
.page-btn.active { background: var(--color-primary-500); color: #fff; border-color: var(--color-primary-500); }
.page-btn:disabled { opacity: .4; cursor: not-allowed; }
.page-info { font-size: 12px; color: var(--color-neutral-500); margin: 0 8px; }

/* ── SIDE PANEL ── */
#side-panel {
  position: fixed;
  top: 56px;
  right: 0;
  width: 420px;
  height: calc(100vh - 56px);
  background: #fff;
  box-shadow: -4px 0 20px rgba(0,0,0,.12);
  transform: translateX(100%);
  transition: transform .25s ease;
  z-index: 80;
  display: flex;
  flex-direction: column;
}
#side-panel.open { transform: translateX(0); }
.panel-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--color-neutral-200);
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-header h3 { font-size: 15px; font-weight: 600; flex: 1; }
.panel-close {
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius);
  cursor: pointer;
  color: var(--color-neutral-500);
  font-size: 18px;
  line-height: 1;
  background: none;
  border: none;
}
.panel-close:hover { background: var(--color-neutral-100); }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }
.panel-section { margin-bottom: 20px; }
.panel-section label {
  display: block;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--color-neutral-500);
  margin-bottom: 6px;
}
.panel-section .field-val {
  font-size: 13px;
  color: var(--color-neutral-700);
  line-height: 1.5;
  word-break: break-word;
}
.panel-section input[type=text],
.panel-section textarea,
.panel-section input[type=number] {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid var(--color-neutral-300);
  border-radius: var(--radius);
  font-size: 13px;
  line-height: 1.4;
  resize: vertical;
}
.panel-section input:focus,
.panel-section textarea:focus { outline: none; border-color: var(--color-primary-400); }
.panel-section .coord-row { display: flex; gap: 8px; }
.panel-section .coord-row input { flex: 1; }
.score-row { display: flex; align-items: center; gap: 10px; }
.score-row input[type=range] { flex: 1; }
.score-row .score-val { font-weight: 700; min-width: 32px; }
.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.tag-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 500;
  background: var(--color-primary-100);
  color: var(--color-primary-500);
}
.tag-chip .rm {
  cursor: pointer;
  opacity: .6;
  font-size: 13px;
  line-height: 1;
  padding: 0 2px;
  background: none;
  border: none;
  color: inherit;
}
.tag-chip .rm:hover { opacity: 1; }
.tag-add-row { display: flex; gap: 6px; }
.tag-add-row input { flex: 1; padding: 6px 10px; border: 1.5px solid var(--color-neutral-300); border-radius: var(--radius); font-size: 12px; }
.tag-add-row input:focus { outline: none; border-color: var(--color-primary-400); }
.tag-add-row button { padding: 6px 12px; background: var(--color-primary-500); color: #fff; border: none; border-radius: var(--radius); font-size: 12px; cursor: pointer; }
.panel-actions {
  padding: 16px 20px;
  border-top: 1px solid var(--color-neutral-200);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.panel-actions .btn { flex: 1; justify-content: center; }

/* ── COLLECT MODAL ── */
#collect-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
#collect-modal.open { display: flex; }
.modal-card {
  background: #fff;
  border-radius: 12px;
  box-shadow: var(--shadow-md);
  padding: 32px;
  width: 480px;
}
.modal-card h3 { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.modal-card p { color: var(--color-neutral-500); font-size: 13px; margin-bottom: 20px; }
.source-check-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 20px;
}
.source-check {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border: 1.5px solid var(--color-neutral-200);
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 13px;
  user-select: none;
}
.source-check:hover { border-color: var(--color-primary-400); }
.source-check input[type=checkbox] { accent-color: var(--color-primary-500); width: 14px; height: 14px; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
#collect-log {
  margin-top: 16px;
  padding: 12px;
  background: var(--color-neutral-900);
  color: #e5e7eb;
  border-radius: var(--radius);
  font-family: monospace;
  font-size: 12px;
  max-height: 160px;
  overflow-y: auto;
  display: none;
  white-space: pre-wrap;
}

/* ── EMPTY / LOADING ── */
.empty-row td {
  text-align: center;
  padding: 48px;
  color: var(--color-neutral-500);
  font-size: 14px;
}
.loading-row td { text-align: center; padding: 32px; }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--color-neutral-200);
  border-top-color: var(--color-primary-500);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--color-neutral-900);
  color: #fff;
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 13px;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s;
  z-index: 999;
  max-width: 320px;
}
#toast.show { opacity: 1; }
#toast.success { background: var(--color-green-600); }
#toast.error   { background: var(--color-red-600); }

/* ── OVERLAY for panel ── */
#panel-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.15);
  z-index: 79;
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="admin-header">
  <div class="brand">KRC World Market <span>관리자</span></div>
  <div class="header-spacer"></div>
  <a href="index.html" class="header-btn" target="_blank">공개 사이트 ↗</a>
  <button class="header-btn" id="btn-collect">수집 실행</button>
  <button class="header-btn" id="btn-export">CSV 내보내기</button>
</header>

<!-- AUTH GATE -->
<div id="auth-gate">
  <div class="auth-card">
    <h2 id="auth-title">🔐 관리자 로그인</h2>
    <p id="auth-desc">Google 계정으로 로그인하세요.<br>관리자 권한이 있는 계정만 접근 가능합니다.</p>
    <button id="btn-google-login" style="display:flex;align-items:center;gap:8px;margin:0 auto;padding:10px 20px;border:1px solid #dadce0;border-radius:8px;background:#fff;cursor:pointer;font-size:15px;font-weight:500;color:#3c4043;">
      <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Google로 계속하기
    </button>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- STATS STRIP -->
  <div class="stats-strip">
    <div class="stat-chip">
      <div class="dot review"></div>
      <div>검수대기</div>
      <div class="stat-num" id="stat-review">—</div>
    </div>
    <div class="divider"></div>
    <div class="stat-chip">
      <div class="dot approved"></div>
      <div>승인(공개)</div>
      <div class="stat-num" id="stat-approved">—</div>
    </div>
    <div class="divider"></div>
    <div class="stat-chip">
      <div class="dot rejected"></div>
      <div>반려</div>
      <div class="stat-num" id="stat-rejected">—</div>
    </div>
    <div class="divider"></div>
    <div class="stat-chip">
      <div class="dot hold"></div>
      <div>보류</div>
      <div class="stat-num" id="stat-hold">—</div>
    </div>
    <div class="stats-collect-info" id="stats-collect-info">마지막 수집: —</div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <input type="text" id="search-input" placeholder="공고명·국가 검색...">
    <select id="filter-status">
      <option value="">전체 상태</option>
      <option value="review" selected>검수대기</option>
      <option value="approved">승인</option>
      <option value="rejected">반려</option>
      <option value="hold">보류</option>
    </select>
    <select id="filter-source">
      <option value="">전체 기관</option>
      <option value="worldbank">World Bank</option>
      <option value="adb">ADB</option>
      <option value="afdb">AfDB</option>
      <option value="aiib">AIIB</option>
      <option value="isdb">IsDB</option>
      <option value="koica">KOICA</option>
      <option value="edcf">EDCF</option>
      <option value="ungm">UNGM</option>
    </select>
    <select id="filter-sort">
      <option value="created">등록일순</option>
      <option value="relevance">관련도순</option>
      <option value="deadline">마감일순</option>
    </select>
    <button class="btn btn-primary" id="btn-search">검색</button>
    <button class="btn btn-secondary" id="btn-reset">초기화</button>
    <div class="spacer"></div>
    <button class="btn btn-success" id="btn-bulk-approve" disabled>선택 승인</button>
    <button class="btn btn-danger" id="btn-bulk-reject" disabled>선택 반려</button>
    <button class="btn btn-warning" id="btn-bulk-hold" disabled>선택 보류</button>
    <span id="sel-count" style="font-size:12px;color:var(--color-neutral-500);"></span>
  </div>

  <!-- TABLE -->
  <div class="table-wrap">
    <div class="table-container">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="chk-all"></th>
            <th>기관</th>
            <th>공고명</th>
            <th>국가</th>
            <th>마감일</th>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API = '';  // same-origin
let currentPage = 1;
const PAGE_SIZE = 50;
let totalCount = 0;
let selectedIds = new Set();
let currentNotice = null;
let editTags = [];

// ── 인증 헤더 헬퍼 ────────────────────────────────────────────────────────────
// Supabase JWT를 우선 사용하고, 없으면 X-Admin-Key(수집 스크립트용) 폴백
async function authHeaders(extra = {}) {
  const token = window._adminToken ? await window._adminToken() : null;
  if (token) return { 'Authorization': `Bearer ${token}`, ...extra };
  return extra;  // 토큰 없으면 빈 헤더 (401 반환됨)
}

// ── 관리자 진입 ───────────────────────────────────────────────────────────────
function enterAdmin() {
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('main').style.display = 'block';
  loadStats();
  loadNotices();
}

// ── STATS ─────────────────────────────────────────────────────────────────────
async function loadStats() {
  try {
    const r = await fetch(`${API}/api/admin/stats`, { headers: await authHeaders() });
    const d = await r.json();
    if (d.success) {
      const bs = d.by_status || {};
      document.getElementById('stat-review').textContent   = (bs.review   || 0).toLocaleString();
      document.getElementById('stat-approved').textContent = (bs.approved || 0).toLocaleString();
      document.getElementById('stat-rejected').textContent = (bs.rejected || 0).toLocaleString();
      document.getElementById('stat-hold').textContent     = (bs.hold     || 0).toLocaleString();
      if (d.last_run) {
        const dt = new Date(d.last_run);
        document.getElementById('stats-collect-info').textContent =
          `마지막 수집: ${dt.toLocaleDateString('ko-KR')} ${dt.toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'})}`;
      }
    }
  } catch {}
}

// ── NOTICES TABLE ─────────────────────────────────────────────────────────────
async function loadNotices(page = 1) {
  currentPage = page;
  selectedIds.clear();
  updateBulkButtons();

  const tbody = document.getElementById('notice-tbody');
  tbody.innerHTML = '<tr class="loading-row"><td colspan="9"><div class="spinner"></div></td></tr>';

  const params = new URLSearchParams();
  const search = document.getElementById('search-input').value.trim();
  const status = document.getElementById('filter-status').value;
  const source = document.getElementById('filter-source').value;
  const sort   = document.getElementById('filter-sort').value;

  if (search) params.set('search', search);
  if (status) params.set('adminStatus', status);
  if (source) params.set('source', source);
  if (sort)   params.set('sort', sort);
  params.set('page', page);
  params.set('perPage', PAGE_SIZE);

  try {
    const r = await fetch(`${API}/api/admin/notices?${params}`, { headers: await authHeaders() });
    const d = await r.json();
    if (!d.success) throw new Error(d.error || 'Error');
    const notices = d.data || [];
    totalCount = d.pagination?.total || 0;
    renderTable(notices);
    renderPagination(totalCount, page);
  } catch (e) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="9">오류: ${e.message}</td></tr>`;
  }
}

function renderTable(notices) {
  const tbody = document.getElementById('notice-tbody');
  if (!notices.length) {
    tbody.innerHTML = '<tr class="empty-row"><td colspan="9">공고가 없습니다.</td></tr>';
    return;
  }

  tbody.innerHTML = notices.map(n => {
    const tags = (n.krcTags || []).slice(0, 3).map(t =>
      `<span class="tag-chip" style="font-size:10px;padding:1px 6px;">${t}</span>`
    ).join('');

    const deadlineStr = formatDeadline(n.deadlineDate);

    const score = n.relevanceScore || 0;
    const barWidth = score + '%';
    const scoreHtml = `<div class="score-bar">
      <div class="bar"><div class="bar-fill" style="width:${barWidth}"></div></div>
      <div class="num">${score}</div>
    </div>`;

    const statusClass = n.adminStatus || 'review';
    const statusLabels = { review:'검수대기', approved:'승인', rejected:'반려', hold:'보류' };

    const sourceName = (n.source || '').toUpperCase().replace('WORLDBANK','WB');

    return `<tr data-id="${n.id}" onclick="handleRowClick(event, ${n.id})">
      <td onclick="event.stopPropagation()">
        <input type="checkbox" class="row-chk" data-id="${n.id}" onchange="handleCheck(this)">
      </td>
      <td><span class="source-badge">${sourceName}</span></td>
      <td class="cell-title">
        <div class="t-main" title="${escHtml(n.title || '')}">${escHtml(n.title || '(제목 없음)')}</div>
        ${n.titleKo ? `<div class="t-sub">${escHtml(n.titleKo)}</div>` : ''}
      </td>
      <td style="white-space:nowrap;font-size:13px;">${escHtml(n.country || '—')}</td>
      <td>${deadlineStr}</td>
      <td>${scoreHtml}</td>
      <td style="max-width:140px;">${tags}</td>
      <td><span class="status-badge ${statusClass}">${statusLabels[statusClass] || statusClass}</span></td>
      <td class="actions-cell" onclick="event.stopPropagation()">
        <button class="act-btn act-approve" onclick="quickStatus(${n.id},'approved')">승인</button>
        <button class="act-btn act-reject"  onclick="quickStatus(${n.id},'rejected')">반려</button>
        <button class="act-btn act-hold"    onclick="quickStatus(${n.id},'hold')">보류</button>
        <button class="act-btn act-edit"    onclick="openPanel(${n.id})">편집</button>
      </td>
    </tr>`;
  }).join('');

  // Restore checkboxes state
  document.querySelectorAll('.row-chk').forEach(chk => {
    chk.checked = selectedIds.has(parseInt(chk.dataset.id));
  });
  document.getElementById('chk-all').checked = false;
}

function formatDeadline(dateStr) {
  if (!dateStr) return '<span style="font-size:12px;color:var(--color-neutral-400);">—</span>';
  const d = new Date(dateStr);
  if (isNaN(d)) return '<span style="font-size:12px;">—</span>';
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  const dateLabel = d.toLocaleDateString('ko-KR', {month:'2-digit',day:'2-digit'});
  let ddayHtml = '';
  if (diff < 0) {
    ddayHtml = `<span class="dday expired">만료</span>`;
  } else if (diff <= 7) {
    ddayHtml = `<span class="dday urgent">D-${diff}</span>`;
  } else if (diff <= 30) {
    ddayHtml = `<span class="dday soon">D-${diff}</span>`;
  } else {
    ddayHtml = `<span class="dday ok">D-${diff}</span>`;
  }
  return `<div class="deadline-cell">${dateLabel}${ddayHtml}</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PAGINATION ────────────────────────────────────────────────────────────────
function renderPagination(total, page) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const el = document.getElementById('pagination');
  if (totalPages <= 1) { el.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="loadNotices(${page-1})" ${page<=1?'disabled':''}>◀</button>`;

  const start = Math.max(1, page - 2);
  const end   = Math.min(totalPages, page + 2);
  if (start > 1) html += `<button class="page-btn" onclick="loadNotices(1)">1</button>`;
  if (start > 2) html += `<span style="padding:0 4px;color:var(--color-neutral-400)">…</span>`;
  for (let i = start; i <= end; i++) {
    html += `<button class="page-btn ${i===page?'active':''}" onclick="loadNotices(${i})">${i}</button>`;
  }
  if (end < totalPages - 1) html += `<span style="padding:0 4px;color:var(--color-neutral-400)">…</span>`;
  if (end < totalPages) html += `<button class="page-btn" onclick="loadNotices(${totalPages})">${totalPages}</button>`;

  html += `<button class="page-btn" onclick="loadNotices(${page+1})" ${page>=totalPages?'disabled':''}>▶</button>`;
  html += `<span class="page-info">${total.toLocaleString()}건 중 ${((page-1)*PAGE_SIZE+1).toLocaleString()}–${Math.min(page*PAGE_SIZE,total).toLocaleString()}</span>`;

  el.innerHTML = html;
}

// ── CHECKBOX / BULK ───────────────────────────────────────────────────────────
document.getElementById('chk-all').addEventListener('change', function() {
  document.querySelectorAll('.row-chk').forEach(chk => {
    chk.checked = this.checked;
    const id = parseInt(chk.dataset.id);
    if (this.checked) selectedIds.add(id);
    else selectedIds.delete(id);
  });
  updateBulkButtons();
});

function handleCheck(chk) {
  const id = parseInt(chk.dataset.id);
  if (chk.checked) selectedIds.add(id);
  else selectedIds.delete(id);
  updateBulkButtons();
}

function updateBulkButtons() {
  const has = selectedIds.size > 0;
  document.getElementById('btn-bulk-approve').disabled = !has;
  document.getElementById('btn-bulk-reject').disabled  = !has;
  document.getElementById('btn-bulk-hold').disabled    = !has;
  document.getElementById('sel-count').textContent = has ? `${selectedIds.size}건 선택` : '';
}

async function bulkAction(action) {
  if (!selectedIds.size) return;
  const ids = [...selectedIds];
  try {
    const r = await fetch(`${API}/api/admin/notices/bulk`, {
      method: 'POST',
      headers: await authHeaders({'Content-Type': 'application/json'}),
      body: JSON.stringify({ action, ids })
    });
    const d = await r.json();
    if (d.success) {
      showToast(`${d.updated || ids.length}건 처리 완료`, 'success');
      selectedIds.clear();
      loadNotices(currentPage);
      loadStats();
    } else {
      showToast(d.error || '오류', 'error');
    }
  } catch (e) {
    showToast('네트워크 오류', 'error');
  }
}

document.getElementById('btn-bulk-approve').addEventListener('click', () => bulkAction('approve'));
document.getElementById('btn-bulk-reject').addEventListener('click',  () => bulkAction('reject'));
document.getElementById('btn-bulk-hold').addEventListener('click',    () => bulkAction('hold'));

// ── ROW CLICK ─────────────────────────────────────────────────────────────────
function handleRowClick(e, id) {
  openPanel(id);
}

// ── QUICK STATUS ──────────────────────────────────────────────────────────────
async function quickStatus(id, status) {
  try {
    const r = await fetch(`${API}/api/admin/notices/${id}`, {
      method: 'PATCH',
      headers: await authHeaders({'Content-Type': 'application/json'}),
      body: JSON.stringify({ adminStatus: status })
    });
    const d = await r.json();
    if (d.success) {
      showToast('상태 변경 완료', 'success');
      loadNotices(currentPage);
      loadStats();
      if (currentNotice && currentNotice.id === id) {
        currentNotice.adminStatus = status;
        document.getElementById('pf-status').value = status;
      }
    } else {
      showToast(d.error || '오류', 'error');
    }
  } catch {
    showToast('네트워크 오류', 'error');
  }
}

// ── SIDE PANEL ────────────────────────────────────────────────────────────────
async function openPanel(id) {
  // Fetch notice detail
  try {
    const r = await fetch(`${API}/api/admin/notices/${id}`, { headers: await authHeaders() });
    const d = await r.json();
    if (!d.success) return;
    currentNotice = d.data;
    populatePanel(d.data);
    document.getElementById('side-panel').classList.add('open');
    document.getElementById('panel-overlay').style.display = 'block';
  } catch {}
}

// Admin single-notice endpoint may not exist separately; fall back to list
// If /api/admin/notices/<id> returns 404, we use the row data instead
async function openPanelFromRow(row) {
  // Try dedicated endpoint first
  try {
    const r = await fetch(`${API}/api/admin/notices/${row.id}`, { headers: await authHeaders() });
    if (r.ok) {
      const d = await r.json();
      if (d.success) {
        currentNotice = d.data;
        populatePanel(d.data);
      } else {
        currentNotice = row;
        populatePanel(row);
      }
    } else {
      currentNotice = row;
      populatePanel(row);
    }
  } catch {
    currentNotice = row;
    populatePanel(row);
  }
  document.getElementById('side-panel').classList.add('open');
  document.getElementById('panel-overlay').style.display = 'block';
}

function populatePanel(n) {
  document.getElementById('panel-title').textContent = `#${n.id} 편집`;
  document.getElementById('pf-title').textContent = n.title || '—';
  const urlEl = document.getElementById('pf-url');
  if (n.sourceUrl) {
    urlEl.href = n.sourceUrl;
    urlEl.textContent = '원문 보기 ↗';
  } else {
    urlEl.href = '#';
    urlEl.textContent = '링크 없음';
  }
  document.getElementById('pf-country-source').textContent =
    [n.country, (n.source || '').toUpperCase()].filter(Boolean).join(' / ') || '—';
  document.getElementById('pf-sector-type').textContent =
    [n.sector, n.noticeType].filter(Boolean).join(' / ') || '—';
  document.getElementById('pf-project').textContent =
    [n.projectId, n.projectName].filter(Boolean).join(' — ') || '—';

  document.getElementById('pf-title-ko').value = n.titleKo || '';

  editTags = Array.isArray(n.krcTags) ? [...n.krcTags] : [];
  renderTagChips();

  const score = n.relevanceScore || 0;
  document.getElementById('pf-score').value = score;
  document.getElementById('pf-score-val').textContent = score;

  document.getElementById('pf-lat').value = n.lat != null ? n.lat : '';
  document.getElementById('pf-lng').value = n.lng != null ? n.lng : '';
  document.getElementById('pf-note').value = n.adminNote || '';
  document.getElementById('pf-status').value = n.adminStatus || 'review';
}

function renderTagChips() {
  const wrap = document.getElementById('pf-tags-wrap');
  if (!editTags.length) {
    wrap.innerHTML = '<span style="font-size:12px;color:var(--color-neutral-400);">태그 없음</span>';
    return;
  }
  wrap.innerHTML = editTags.map((t, i) =>
    `<span class="tag-chip">${escHtml(t)}<button class="rm" onclick="removeTag(${i})">×</button></span>`
  ).join('');
}

function removeTag(i) {
  editTags.splice(i, 1);
  renderTagChips();
}

document.getElementById('pf-tag-add-btn').addEventListener('click', () => {
  const inp = document.getElementById('pf-tag-input');
  const v = inp.value.trim();
  if (v && !editTags.includes(v)) {
    editTags.push(v);
    renderTagChips();
  }
  inp.value = '';
});
document.getElementById('pf-tag-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { e.preventDefault(); document.getElementById('pf-tag-add-btn').click(); }
});

document.getElementById('pf-score').addEventListener('input', function() {
  document.getElementById('pf-score-val').textContent = this.value;
});

// Panel close
document.getElementById('panel-close-btn').addEventListener('click', closePanel);
document.getElementById('panel-overlay').addEventListener('click', closePanel);
function closePanel() {
  document.getElementById('side-panel').classList.remove('open');
  document.getElementById('panel-overlay').style.display = 'none';
  currentNotice = null;
}

// Panel action buttons
document.getElementById('pf-btn-approve').addEventListener('click', () => { if (currentNotice) quickStatus(currentNotice.id, 'approved').then(() => savePanelMeta()); });
document.getElementById('pf-btn-reject').addEventListener('click',  () => { if (currentNotice) quickStatus(currentNotice.id, 'rejected'); });
document.getElementById('pf-btn-hold').addEventListener('click',    () => { if (currentNotice) quickStatus(currentNotice.id, 'hold'); });
document.getElementById('pf-btn-save').addEventListener('click', savePanelMeta);

async function savePanelMeta() {
  if (!currentNotice) return;
  const payload = {
    adminStatus:    document.getElementById('pf-status').value,
    adminNote:      document.getElementById('pf-note').value,
    titleKo:        document.getElementById('pf-title-ko').value,
    krcTags:        editTags,
    relevanceScore: parseInt(document.getElementById('pf-score').value) || 0,
    lat: document.getElementById('pf-lat').value !== '' ? parseFloat(document.getElementById('pf-lat').value) : null,
    lng: document.getElementById('pf-lng').value !== '' ? parseFloat(document.getElementById('pf-lng').value) : null,
  };
  try {
    const r = await fetch(`${API}/api/admin/notices/${currentNotice.id}`, {
      method: 'PATCH',
      headers: await authHeaders({'Content-Type': 'application/json'}),
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    if (d.success) {
      showToast('저장 완료', 'success');
      loadNotices(currentPage);
      loadStats();
    } else {
      showToast(d.error || '저장 실패', 'error');
    }
  } catch {
    showToast('네트워크 오류', 'error');
  }
}

// ── SEARCH / FILTER ───────────────────────────────────────────────────────────
document.getElementById('btn-search').addEventListener('click', () => loadNotices(1));
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') loadNotices(1); });
document.getElementById('btn-reset').addEventListener('click', () => {
  document.getElementById('search-input').value = '';
  document.getElementById('filter-status').value = 'review';
  document.getElementById('filter-source').value = '';
  document.getElementById('filter-sort').value = 'created';
  loadNotices(1);
});

// ── COLLECT MODAL ─────────────────────────────────────────────────────────────
document.getElementById('btn-collect').addEventListener('click', () => {
  document.getElementById('collect-log').style.display = 'none';
  document.getElementById('collect-log').textContent = '';
  document.getElementById('collect-modal').classList.add('open');
});
document.getElementById('collect-cancel').addEventListener('click', () => {
  document.getElementById('collect-modal').classList.remove('open');
});
document.getElementById('collect-run').addEventListener('click', async () => {
  const checked = [...document.querySelectorAll('#collect-modal input[type=checkbox]:checked')].map(c => c.value);
  const payload = { trigger: 'manual' };
  if (checked.length) payload.sources = checked;

  const logEl = document.getElementById('collect-log');
  logEl.style.display = 'block';
  logEl.textContent = '수집 시작 중...\n';
  document.getElementById('collect-run').disabled = true;

  try {
    const r = await fetch(`${API}/api/admin/collect`, {
      method: 'POST',
      headers: await authHeaders({'Content-Type': 'application/json'}),
      body: JSON.stringify(payload)
    });
    const d = await r.json();
    logEl.textContent += JSON.stringify(d, null, 2);
    showToast('수집 완료', 'success');
    loadStats();
    loadNotices(1);
  } catch (e) {
    logEl.textContent += `오류: ${e.message}`;
    showToast('수집 오류', 'error');
  } finally {
    document.getElementById('collect-run').disabled = false;
  }
});

// ── EXPORT ────────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  const params = new URLSearchParams();
  const status = document.getElementById('filter-status').value;
  const source = document.getElementById('filter-source').value;
  if (status) params.set('adminStatus', status);
  if (source) params.set('source', source);
  // export는 GET 요청이라 Authorization 헤더 사용이 어려우므로 토큰을 query param으로 전달
  const token = window._adminToken ? await window._adminToken() : null;
  if (token) params.set('token', token);
  const url = `${API}/api/admin/notices/export?${params}`;
  window.open(url, '_blank');
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}


</script>

<!-- Supabase 인증 모듈 -->
<script type="module">
import { getSession, isAdmin, getAdminToken, signInWithGoogle, signOut } from '/assets/js/supabase-client.js';

// Flask API 호출용 JWT 토큰 제공 (인라인 스크립트 브리지)
window._adminToken = getAdminToken;

// 관리자 로그아웃 버튼
window._adminSignOut = async function() {
  await signOut();
};

// 구글 로그인 버튼 이벤트
document.getElementById('btn-google-login')?.addEventListener('click', signInWithGoogle);

// 초기 인증 상태 확인
const session = await getSession();

if (!session) {
  // 미로그인 → 로그인 버튼 표시 (기본값)
} else if (!isAdmin(session)) {
  // 로그인했으나 관리자 아님
  document.getElementById('auth-title').textContent = '🚫 접근 권한 없음';
  document.getElementById('auth-desc').textContent  = '관리자 권한이 있는 Google 계정이 필요합니다.';
  document.getElementById('btn-google-login').style.display = 'none';
} else {
  // 관리자 — 바로 진입
  enterAdmin();

  // 헤더에 유저 정보 + 로그아웃 추가
  const header = document.querySelector('.admin-header');
  const user = session.user;
  const avatarUrl = user.user_metadata?.avatar_url || '';
  const name = user.user_metadata?.full_name || user.email || '';
  const pill = document.createElement('div');
  pill.style.cssText = 'display:flex;align-items:center;gap:8px;';
  pill.innerHTML = `
    ${avatarUrl ? `<img src="${avatarUrl}" style="width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.4);" alt="">` : ''}
    <span style="font-size:13px;color:#fff;">${name}</span>
    <a href="/analytics.html" class="header-btn">애널리틱스</a>
    <button class="header-btn" onclick="window._adminSignOut()">로그아웃</button>
  `;
  header.appendChild(pill);
}
</script>
