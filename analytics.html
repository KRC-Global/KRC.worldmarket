<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRC World Market — 애널리틱스</title>
<link rel="stylesheet" href="/assets/css/variables.css">
<link rel="stylesheet" href="/assets/css/base.css">
<link rel="stylesheet" href="/assets/css/components.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Pretendard', -apple-system, sans-serif; background: #f9fafb; color: #111827; }

/* 헤더 (index.html 동일) */
.platform-header {
  background: var(--color-primary-500, #1A4B7C);
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.2);
}
.platform-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; }
.brand-icon { font-size: 22px; }
.brand-title { font-size: 16px; font-weight: 700; letter-spacing: -.3px; }
.brand-sub   { font-size: 11px; opacity: .75; margin-top: 1px; }
.platform-nav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
.nav-link {
  padding: 5px 12px;
  border-radius: 6px;
  text-decoration: none;
  color: rgba(255,255,255,.8);
  font-size: 13px;
  font-weight: 500;
  transition: background .15s;
}
.nav-link:hover { background: rgba(255,255,255,.15); color: #fff; }
.nav-link.active { background: rgba(255,255,255,.2); color: #fff; }

/* 인증 게이트 */
#auth-gate {
  min-height: calc(100vh - 56px);
  display: flex; align-items: center; justify-content: center;
}
.auth-card {
  background: #fff; border-radius: 12px;
  box-shadow: 0 4px 12px rgba(0,0,0,.15);
  padding: 48px; text-align: center; max-width: 400px;
}
.auth-card h2 { font-size: 22px; margin-bottom: 10px; }
.auth-card p { color: #6b7280; font-size: 14px; }

/* 메인 */
#main { display: none; max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }

/* KPI 스트립 */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.kpi-card {
  background: #fff;
  border-radius: 10px;
  padding: 20px 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  border: 1px solid #e5e7eb;
}
.kpi-label { font-size: 12px; color: #6b7280; font-weight: 500; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .4px; }
.kpi-value { font-size: 30px; font-weight: 700; color: #1A4B7C; }
.kpi-sub   { font-size: 12px; color: #9ca3af; margin-top: 4px; }

/* 차트 그리드 */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}
.chart-card {
  background: #fff;
  border-radius: 10px;
  padding: 20px 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  border: 1px solid #e5e7eb;
}
.chart-card h3 {
  font-size: 14px; font-weight: 700;
  color: #1A4B7C; margin-bottom: 16px;
}

/* 테이블 그리드 */
.table-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.table-card {
  background: #fff;
  border-radius: 10px;
  padding: 20px 24px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
  border: 1px solid #e5e7eb;
}
.table-card h3 {
  font-size: 14px; font-weight: 700;
  color: #1A4B7C; margin-bottom: 16px;
}
.analytics-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.analytics-table thead th {
  text-align: left; padding: 6px 0;
  font-size: 11px; color: #9ca3af; font-weight: 600;
  border-bottom: 2px solid #f3f4f6; text-transform: uppercase; letter-spacing: .4px;
}
.analytics-table tbody tr { border-bottom: 1px solid #f9fafb; }
.analytics-table tbody td { padding: 8px 0; }
.rank-num { color: #d1d5db; font-size: 12px; width: 20px; }
.analytics-count {
  font-weight: 700; color: #1A4B7C; text-align: right;
}
.no-data { color: #9ca3af; font-size: 13px; padding: 16px 0; text-align: center; }

/* 섹션 헤더 */
.section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px;
}
.section-header h2 { font-size: 16px; font-weight: 700; color: #111827; }
.section-header .date-range { font-size: 12px; color: #6b7280; }

@media (max-width: 768px) {
  .kpi-strip { grid-template-columns: 1fr 1fr; }
  .chart-grid, .table-grid { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .kpi-strip { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="platform-header">
  <a class="platform-brand" href="/">
    <span class="brand-icon">🌐</span>
    <div>
      <div class="brand-title">KRC World Market</div>
      <div class="brand-sub">한국농어촌공사 해외발주공고 탐색</div>
    </div>
  </a>
  <nav class="platform-nav" id="mainNav">
    <a href="/" class="nav-link">공고 탐색</a>
    <a href="/admin.html" class="nav-link">관리자</a>
    <a href="/analytics.html" class="nav-link active">애널리틱스</a>
  </nav>
</header>

<!-- 인증 게이트 -->
<div id="auth-gate">
  <div class="auth-card">
    <h2 id="gate-title">🔒 로딩 중...</h2>
    <p id="gate-desc"></p>
  </div>
</div>

<!-- 메인 대시보드 -->
<main id="main">

  <div class="section-header">
    <h2>방문자 분석 대시보드</h2>
    <span class="date-range" id="date-range-label">최근 7일</span>
  </div>

  <!-- KPI 카드 -->
  <div class="kpi-strip">
    <div class="kpi-card">
      <div class="kpi-label">오늘 세션</div>
      <div class="kpi-value" id="kpi-today">—</div>
      <div class="kpi-sub">유니크 방문자</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">7일 페이지뷰</div>
      <div class="kpi-value" id="kpi-views">—</div>
      <div class="kpi-sub">총 페이지 조회</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">7일 공고뷰</div>
      <div class="kpi-value" id="kpi-notice-views">—</div>
      <div class="kpi-sub">공고 상세 조회</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">7일 검색</div>
      <div class="kpi-value" id="kpi-searches">—</div>
      <div class="kpi-sub">총 검색 이벤트</div>
    </div>
  </div>

  <!-- 차트 -->
  <div class="chart-grid">
    <div class="chart-card">
      <h3>일별 방문자 (유니크 세션, 최근 7일)</h3>
      <canvas id="chart-visitors" height="160"></canvas>
    </div>
    <div class="chart-card">
      <h3>발주처별 공고 뷰</h3>
      <canvas id="chart-sources" height="160"></canvas>
    </div>
  </div>

  <!-- 테이블 -->
  <div class="table-grid">
    <div class="table-card">
      <h3>인기 검색어 TOP 10</h3>
      <table class="analytics-table">
        <thead>
          <tr>
            <th style="width:24px;">#</th>
            <th>검색어</th>
            <th style="text-align:right;">횟수</th>
          </tr>
        </thead>
        <tbody id="table-keywords"></tbody>
      </table>
    </div>
    <div class="table-card">
      <h3>많이 본 공고 TOP 10</h3>
      <table class="analytics-table">
        <thead>
          <tr>
            <th style="width:24px;">#</th>
            <th>공고 ID</th>
            <th style="text-align:right;">뷰 수</th>
          </tr>
        </thead>
        <tbody id="table-notices"></tbody>
      </table>
    </div>
  </div>

</main>

<script type="module">
import {
  getSession, isAdmin, renderAuthUI, trackPageView, supabase,
} from '/assets/js/supabase-client.js';

// 헤더 인증 UI
const nav = document.getElementById('mainNav');
await renderAuthUI(nav, {});

// 인증 확인
const session = await getSession();
const gateEl  = document.getElementById('auth-gate');
const mainEl  = document.getElementById('main');
const titleEl = document.getElementById('gate-title');
const descEl  = document.getElementById('gate-desc');

if (!session) {
  titleEl.textContent = '🔐 로그인이 필요합니다';
  descEl.textContent  = 'Google 계정으로 로그인 후 이용하세요.';
  return;
}
if (!isAdmin(session)) {
  titleEl.textContent = '🚫 관리자 전용 페이지입니다';
  descEl.textContent  = '관리자 권한이 있는 계정으로 로그인하세요.';
  return;
}

// 관리자 확인 — 대시보드 표시
gateEl.style.display = 'none';
mainEl.style.display = 'block';
trackPageView('/analytics.html');

// ── 날짜 범위 설정 ─────────────────────────────────────────────────────────────
const now         = new Date();
const sevenDaysAgo = new Date(now - 7 * 24 * 60 * 60 * 1000).toISOString();
const todayStart   = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();

const fmtDate = d => {
  const dt = new Date(d);
  return `${dt.getMonth()+1}/${dt.getDate()}`;
};
document.getElementById('date-range-label').textContent =
  `${fmtDate(sevenDaysAgo)} ~ ${fmtDate(now)} (최근 7일)`;

// ── KPI: 오늘 세션 ─────────────────────────────────────────────────────────────
const { data: todayPV } = await supabase
  .from('page_views').select('session_id').gte('created_at', todayStart);
const todayUnique = new Set((todayPV||[]).map(r => r.session_id)).size;
document.getElementById('kpi-today').textContent = todayUnique.toLocaleString();

// ── KPI: 7일 페이지뷰 ─────────────────────────────────────────────────────────
const { count: weekViews } = await supabase
  .from('page_views').select('*', { count: 'exact', head: true }).gte('created_at', sevenDaysAgo);
document.getElementById('kpi-views').textContent = (weekViews||0).toLocaleString();

// ── KPI: 7일 공고뷰 ───────────────────────────────────────────────────────────
const { count: weekNV } = await supabase
  .from('notice_views').select('*', { count: 'exact', head: true }).gte('created_at', sevenDaysAgo);
document.getElementById('kpi-notice-views').textContent = (weekNV||0).toLocaleString();

// ── KPI: 7일 검색 ─────────────────────────────────────────────────────────────
const { count: weekSE } = await supabase
  .from('search_events').select('*', { count: 'exact', head: true }).gte('created_at', sevenDaysAgo);
document.getElementById('kpi-searches').textContent = (weekSE||0).toLocaleString();

// ── 차트 1: 일별 방문자 ───────────────────────────────────────────────────────
const { data: pvRows } = await supabase
  .from('page_views').select('created_at, session_id')
  .gte('created_at', sevenDaysAgo).order('created_at', { ascending: true });

const dailyMap = {};
for (let i = 6; i >= 0; i--) {
  const d = new Date(now - i * 86400000);
  dailyMap[d.toISOString().slice(0, 10)] = new Set();
}
(pvRows||[]).forEach(r => {
  const key = r.created_at.slice(0, 10);
  if (dailyMap[key]) dailyMap[key].add(r.session_id);
});
const dayLabels = Object.keys(dailyMap).map(k => k.slice(5).replace('-', '/'));
const dayCounts = Object.values(dailyMap).map(s => s.size);

new Chart(document.getElementById('chart-visitors'), {
  type: 'line',
  data: {
    labels: dayLabels,
    datasets: [{
      label: '유니크 세션',
      data: dayCounts,
      borderColor: '#1A4B7C',
      backgroundColor: 'rgba(26,75,124,0.08)',
      tension: 0.35, fill: true,
      pointBackgroundColor: '#1A4B7C',
      pointRadius: 4,
    }],
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
  },
});

// ── 차트 2: 발주처별 공고뷰 ──────────────────────────────────────────────────
const { data: nvRows } = await supabase
  .from('notice_views').select('source').gte('created_at', sevenDaysAgo);

const sourceCounts = {};
(nvRows||[]).forEach(r => {
  const s = r.source || 'direct';
  sourceCounts[s] = (sourceCounts[s]||0) + 1;
});
const srcLabels = Object.keys(sourceCounts);
const srcData   = Object.values(sourceCounts);
const CHART_COLORS = [
  '#1A4B7C','#2563a8','#3b82f6','#60a5fa','#93c5fd',
  '#f59e0b','#ef4444','#10b981','#8b5cf6','#f97316',
];

new Chart(document.getElementById('chart-sources'), {
  type: 'bar',
  data: {
    labels: srcLabels.length ? srcLabels : ['데이터 없음'],
    datasets: [{
      label: '공고 뷰',
      data: srcData.length ? srcData : [0],
      backgroundColor: CHART_COLORS.slice(0, Math.max(srcLabels.length, 1)),
      borderRadius: 4,
    }],
  },
  options: {
    responsive: true,
    plugins: { legend: { display: false } },
    scales: { y: { beginAtZero: true, ticks: { precision: 0 } } },
  },
});

// ── 테이블: 인기 검색어 TOP 10 ───────────────────────────────────────────────
const { data: seRows } = await supabase
  .from('search_events').select('query').gte('created_at', sevenDaysAgo).not('query', 'is', null);

const queryCounts = {};
(seRows||[]).forEach(r => {
  const q = (r.query||'').trim().toLowerCase();
  if (q) queryCounts[q] = (queryCounts[q]||0) + 1;
});
const topKeywords = Object.entries(queryCounts).sort((a,b) => b[1]-a[1]).slice(0, 10);
const kwTbody = document.getElementById('table-keywords');
kwTbody.innerHTML = topKeywords.length
  ? topKeywords.map(([q, c], i) => `
      <tr>
        <td class="rank-num">${i+1}</td>
        <td>${escHtml(q)}</td>
        <td class="analytics-count">${c}</td>
      </tr>`).join('')
  : `<tr><td colspan="3" class="no-data">검색 데이터가 아직 없습니다</td></tr>`;

// ── 테이블: 많이 본 공고 TOP 10 ──────────────────────────────────────────────
const { data: nvAll } = await supabase
  .from('notice_views').select('notice_id').gte('created_at', sevenDaysAgo);

const noticeCounts = {};
(nvAll||[]).forEach(r => {
  noticeCounts[r.notice_id] = (noticeCounts[r.notice_id]||0) + 1;
});
const topNotices = Object.entries(noticeCounts).sort((a,b) => b[1]-a[1]).slice(0, 10);
const nTbody = document.getElementById('table-notices');
nTbody.innerHTML = topNotices.length
  ? topNotices.map(([id, c], i) => `
      <tr>
        <td class="rank-num">${i+1}</td>
        <td><a href="/?notice=${id}" style="color:#1A4B7C;text-decoration:none;">#${id}</a></td>
        <td class="analytics-count">${c}</td>
      </tr>`).join('')
  : `<tr><td colspan="3" class="no-data">공고뷰 데이터가 아직 없습니다</td></tr>`;

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
